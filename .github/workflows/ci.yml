name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Ruby 2.4 + ActiveSupport 4.2
          - ruby: "2.4"
            gemfile: gemfiles/activesupport_4.2.gemfile
          # Ruby 2.5 + ActiveSupport 5.2
          - ruby: "2.5"
            gemfile: gemfiles/activesupport_5.2.gemfile
          # Ruby 2.7 + ActiveSupport 6.0
          - ruby: "2.7"
            gemfile: gemfiles/activesupport_6.0.gemfile
          # Ruby 2.7 + ActiveSupport 6.1
          - ruby: "2.7"
            gemfile: gemfiles/activesupport_6.1.gemfile
          # Ruby 3.0 + ActiveSupport 6.1
          - ruby: "3.0"
            gemfile: gemfiles/activesupport_6.1.gemfile
          # Ruby 3.0 + ActiveSupport 7.0
          - ruby: "3.0"
            gemfile: gemfiles/activesupport_7.0.gemfile
          # Ruby 3.1 + ActiveSupport 7.0
          - ruby: "3.1"
            gemfile: gemfiles/activesupport_7.0.gemfile
          # Ruby 3.1 + ActiveSupport 7.1
          - ruby: "3.1"
            gemfile: gemfiles/activesupport_7.1.gemfile
          # Ruby 3.2 + ActiveSupport 7.1
          - ruby: "3.2"
            gemfile: gemfiles/activesupport_7.1.gemfile
          # Ruby 3.2 + ActiveSupport 7.2
          - ruby: "3.2"
            gemfile: gemfiles/activesupport_7.2.gemfile
          # Ruby 3.3 + ActiveSupport 7.2
          - ruby: "3.3"
            gemfile: gemfiles/activesupport_7.2.gemfile
          # Ruby 3.3 + ActiveSupport 8.0
          - ruby: "3.3"
            gemfile: gemfiles/activesupport_8.0.gemfile

    env:
      BUNDLE_GEMFILE: ${{ matrix.gemfile }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby ${{ matrix.ruby }}
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Run tests
        run: bundle exec rake test

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Run RuboCop
        run: bundle exec rubocop
